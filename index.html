<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xRocket - OTON</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Шапка с балансом -->
        <div class="header">
            <div class="balance-top">
                <span class="balance-amount">0</span>
                <span class="balance-currency">OTON</span>
            </div>
            <div class="collections-count">3 collections</div>
            <div class="commission">Commission 0%</div>
        </div>

        <!-- Основное меню -->
        <div class="main-menu">
            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab active">All items</button>
                <button class="tab">Collections</button>
                <button class="tab">Bundles</button>
            </div>

            <!-- Поиск -->
            <div class="quick-find">
                <i class="fas fa-search"></i>
                <span>Quick find</span>
            </div>

            <!-- Сетка элементов (верхняя) -->
            <div class="items-grid">
                <!-- Collection -->
                <div class="menu-item collection-item" data-action="collection">
                    <div class="item-icon">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <span>Collection</span>
                </div>

                <!-- Model -->
                <div class="menu-item model-item" data-action="model">
                    <div class="item-icon">
                        <i class="fas fa-cube"></i>
                    </div>
                    <span>Model</span>
                </div>
            </div>

            <!-- Нижняя навигация с NFT, My gift, Profile -->
            <nav class="bottom-nav">
                <div class="nav-item" data-nav="nft">
                    <i class="fas fa-image"></i>
                    <span>NFT</span>
                </div>
                <div class="nav-item" data-nav="gift">
                    <i class="fas fa-gift"></i>
                    <span>My gift</span>
                </div>
                <div class="nav-item" data-nav="profile">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </div>
            </nav>

            <!-- Дополнительные кнопки (Back, Store, Season) -->
            <div class="bottom-actions">
                <!-- Back -->
                <div class="action-btn back-item" data-action="back">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back</span>
                </div>

                <!-- Store -->
                <div class="action-btn store-item" data-action="store">
                    <i class="fas fa-store"></i>
                    <span>Store</span>
                </div>

                <!-- Season -->
                <div class="action-btn season-item" data-action="season">
                    <i class="fas fa-calendar"></i>
                    <span>Season</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
