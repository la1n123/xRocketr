<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xRocket - OTON</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Маленький кошелек в правом верхнем углу -->
        <div class="wallet-corner" id="walletButton">
            <div class="wallet-icon">
                <i class="fas fa-wallet"></i>
            </div>
            <div class="wallet-info">
                <span class="wallet-balance">0</span>
                <span class="wallet-currency">OTON</span>
            </div>
        </div>

        <!-- Основное меню (видно по умолчанию) -->
        <div id="mainMenu" class="main-menu">
            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab active">All items</button>
                <button class="tab">Collections</button>
                <button class="tab">Bundles</button>
            </div>

            <!-- Поиск -->
            <div class="quick-find">
                <i class="fas fa-search"></i>
                <span>Quick find</span>
            </div>

            <!-- Collection и Model -->
            <div class="items-grid">
                <div class="menu-item collection-item" data-action="collection">
                    <div class="item-icon">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <span>Collection</span>
                </div>

                <div class="menu-item model-item" data-action="model">
                    <div class="item-icon">
                        <i class="fas fa-cube"></i>
                    </div>
                    <span>Model</span>
                </div>
            </div>

            <!-- Нижняя навигация -->
            <nav class="bottom-nav">
                <div class="nav-item" data-nav="nft">
                    <i class="fas fa-image"></i>
                    <span>NFT</span>
                </div>
                <div class="nav-item active" data-nav="gift" id="giftNavButton">
                    <i class="fas fa-gift"></i>
                    <span>My gift</span>
                </div>
                <div class="nav-item" data-nav="profile">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </div>
            </nav>
        </div>

        <!-- Страница My Gift (скрыта по умолчанию) -->
        <div id="giftPage" class="gift-page" style="display: none;">
            <div class="gift-header">
                <button class="back-button" id="backFromGift">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2>My Gift</h2>
            </div>

            <div class="gift-content">
                <div class="nft-zero">
                    <div class="nft-zero-icon">
                        <i class="fas fa-gift"></i>
                    </div>
                    <div class="nft-zero-text">0 NFT</div>
                    <div class="nft-zero-subtext">У вас пока нет подарков</div>
                </div>

                <div class="gift-actions">
                    <button class="gift-action-btn replenish-btn" id="replenishBtn">
                        <i class="fas fa-plus-circle"></i>
                        Пополнить
                    </button>
                    <button class="gift-action-btn withdraw-btn" id="withdrawBtn">
                        <i class="fas fa-minus-circle"></i>
                        Вывести
                    </button>
                </div>
            </div>
        </div>

        <!-- Модальное окно для пополнения -->
        <div id="replenishModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Пополнение</h3>
                    <button class="close-modal" id="closeModal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="manager-info">
                        <i class="fas fa-user-tie"></i>
                        <p>Передайте подарок нашему менеджеру:</p>
                        <div class="manager-username" id="managerUsername">
                            @ManagerKupiKod
                        </div>
                        <button class="copy-btn" id="copyManager">
                            <i class="fas fa-copy"></i> Копировать
                        </button>
                    </div>
                    <div class="modal-note">
                        После отправки подарка, напишите менеджеру для подтверждения
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
