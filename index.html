<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xRocket - OTON</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Шапка с балансом -->
        <div class="header">
            <div class="balance-top">
                <span class="balance-amount">0</span>
                <span class="balance-currency">OTON</span>
            </div>
            <div class="collections-count">3 collections</div>
            <div class="commission">Commission 0%</div>
        </div>

        <!-- Основное меню -->
        <div class="main-menu">
            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab active">All items</button>
                <button class="tab">Collections</button>
                <button class="tab">Bundles</button>
            </div>

            <!-- Поиск -->
            <div class="quick-find">
                <i class="fas fa-search"></i>
                <span>Quick find</span>
            </div>

            <!-- Сетка элементов -->
            <div class="items-grid">
                <!-- Collection -->
                <div class="menu-item collection-item">
                    <div class="item-icon">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <span>Collection</span>
                </div>

                <!-- Model -->
                <div class="menu-item model-item">
                    <div class="item-icon">
                        <i class="fas fa-cube"></i>
                    </div>
                    <span>Model</span>
                </div>

                <!-- Back -->
                <div class="menu-item back-item">
                    <div class="item-icon">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                    <span>Back</span>
                </div>

                <!-- Store -->
                <div class="menu-item store-item">
                    <div class="item-icon">
                        <i class="fas fa-store"></i>
                    </div>
                    <span>Store</span>
                </div>

                <!-- My gifts -->
                <div class="menu-item gifts-item">
                    <div class="item-icon">
                        <i class="fas fa-gift"></i>
                    </div>
                    <span>My gifts</span>
                </div>

                <!-- Season -->
                <div class="menu-item season-item">
                    <div class="item-icon">
                        <i class="fas fa-calendar"></i>
                    </div>
                    <span>Season</span>
                </div>
            </div>
        </div>

        <!-- Нижняя навигация (как в OTON) -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-compass"></i>
                <span>Explore</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-wallet"></i>
                <span>Wallet</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
