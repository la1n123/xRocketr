<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KupiGifts — Portal Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0A0A0F; font-family: 'Inter', sans-serif; color: #fff; height: 100vh; overflow: hidden; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, #12121A, #050508); z-index: -2; }
        body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
        #preloader { position: fixed; inset: 0; background: #0A0A0F; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s; }
        #preloader.hide { opacity: 0; pointer-events: none; }
        .loader { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #00FF88, #006644); animation: spin 0.8s ease infinite; box-shadow: 0 0 15px #00FF88; }
        @keyframes spin { 0% { transform: scale(0.9); } 100% { transform: scale(1.1); } }
        #app { display: flex; flex-direction: column; height: 100vh; opacity: 0; transition: opacity 0.3s; }
        #app.show { opacity: 1; }
        .top-bar { padding: 14px 20px; background: rgba(10,10,15,0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,255,136,0.2); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #fff, #00FF88); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .points { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); border-radius: 40px; padding: 4px 12px; font-size: 12px; font-weight: 600; }
        .currencies { display: flex; gap: 10px; }
        .currency { background: rgba(255,255,255,0.05); border-radius: 40px; padding: 4px 10px; font-size: 11px; font-weight: 500; }
        .currency.ton { color: #4FC3F7; }
        .currency.rub { color: #00FF88; }
        .currency.stars { color: #FFD966; }
        .content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
        .tab-pane { display: none; animation: fade 0.2s; }
        .tab-pane.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .filter-section { margin-bottom: 16px; }
        .filter-row { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 12px; padding-bottom: 4px; }
        .filter-pill { padding: 6px 16px; background: rgba(30,30,40,0.7); border: 1px solid rgba(0,255,136,0.2); border-radius: 40px; font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .filter-pill.active, .filter-pill:hover { background: rgba(0,255,136,0.2); border-color: #00FF88; color: #00FF88; }
        .price-range { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; background: rgba(30,30,40,0.5); padding: 8px 12px; border-radius: 40px; margin-bottom: 16px; }
        .price-range input { background: #0A0A0F; border: 1px solid rgba(0,255,136,0.3); border-radius: 30px; padding: 6px 12px; width: 90px; color: white; font-size: 12px; }
        .price-range button { background: rgba(0,255,136,0.2); border: none; padding: 6px 16px; border-radius: 30px; color: #00FF88; cursor: pointer; font-size: 12px; }
        .sort-bar { display: flex; justify-content: flex-end; margin-bottom: 16px; }
        .sort-btn { padding: 5px 12px; background: rgba(30,30,40,0.7); border: 1px solid rgba(0,255,136,0.3); border-radius: 30px; font-size: 12px; cursor: pointer; margin-left: 8px; }
        .sort-btn.active { background: #00FF88; color: #050508; }
        .gifts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        @media (min-width: 500px) { .gifts-grid { grid-template-columns: repeat(3, 1fr); } }
        .gift-card { background: rgba(28,28,36,0.7); backdrop-filter: blur(12px); border-radius: 24px; padding: 12px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(0,255,136,0.2); position: relative; }
        .gift-card:hover { transform: translateY(-4px); border-color: #00FF88; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .gift-img { width: 100%; aspect-ratio: 1; border-radius: 18px; object-fit: cover; background: #1E1E28; }
        .gift-name { font-weight: 700; font-size: 14px; margin-top: 8px; }
        .gift-number { font-size: 10px; color: #aaa; font-family: monospace; margin: 4px 0; }
        .gift-price { font-weight: 800; font-size: 14px; color: #00FF88; }
        .gift-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 2px 8px; border-radius: 30px; font-size: 9px; font-weight: 700; color: #FFD966; }
        .bottom-nav { position: fixed; bottom: 16px; left: 16px; right: 16px; background: rgba(20,20,28,0.85); backdrop-filter: blur(20px); border-radius: 50px; display: flex; padding: 5px; gap: 6px; border: 1px solid rgba(0,255,136,0.3); z-index: 100; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: transparent; border: none; color: rgba(255,255,255,0.6); font-size: 10px; font-weight: 500; padding: 8px 0; border-radius: 40px; cursor: pointer; transition: 0.2s; }
        .nav-btn.active { background: rgba(0,255,136,0.2); color: #00FF88; }
        .nav-icon { font-size: 20px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: 0.2s; }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal-content { background: #1A1A24; border-radius: 28px 28px 0 0; width: 100%; max-width: 450px; padding: 24px; transform: translateY(30px); transition: 0.25s; border-top: 2px solid #00FF88; }
        .modal-overlay.open .modal-content { transform: translateY(0); }
        .modal-stats { display: flex; gap: 10px; margin: 16px 0; }
        .modal-stat { flex: 1; background: rgba(255,255,255,0.05); border-radius: 16px; padding: 8px; text-align: center; }
        .buy-btn { width: 100%; padding: 14px; background: #00FF88; border: none; border-radius: 40px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 12px; color: #050508; }
        .admin-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.2s; padding: 20px; }
        .admin-modal.open { opacity: 1; pointer-events: all; }
        .admin-panel { background: #1A1A24; border-radius: 32px; padding: 24px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; border: 1px solid #00FF88; }
        .admin-input, .admin-select { width: 100%; padding: 12px; background: #0A0A0F; border: 1px solid #2A2A35; border-radius: 20px; color: white; margin-bottom: 12px; font-size: 14px; }
        .admin-btn { padding: 12px; background: #00FF88; border: none; border-radius: 40px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 8px; color: #050508; }
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1A1A24; border: 1px solid #00FF88; padding: 8px 20px; border-radius: 40px; font-size: 13px; opacity: 0; transition: 0.2s; z-index: 400; white-space: nowrap; }
        .toast.show { opacity: 1; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, #00FF88, #006644); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; }
        .preview-img { width: 100%; border-radius: 20px; margin-top: 8px; max-height: 140px; object-fit: contain; background: #0A0A0F; }
        .admin-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .admin-row > * { flex: 1; margin-bottom: 0; }
        .mygifts-actions { display: flex; gap: 8px; margin: 16px 0; overflow-x: auto; }
        .mygifts-action-btn { background: rgba(30,30,40,0.7); border: 1px solid rgba(0,255,136,0.3); border-radius: 40px; padding: 8px 16px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; }
        .mygifts-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .mygifts-tab { background: rgba(30,30,40,0.5); border-radius: 40px; padding: 6px 16px; font-size: 12px; cursor: pointer; }
        .mygifts-tab.active { background: rgba(0,255,136,0.2); color: #00FF88; }
        .filter-stubs { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
        .stub { background: rgba(30,30,40,0.5); border-radius: 30px; padding: 5px 12px; font-size: 11px; color: #aaa; }
        .manager-link { margin-top: 16px; font-size: 12px; color: #aaa; }
        .manager-link a { color: #00FF88; text-decoration: none; }
    </style>
</head>
<body>
<div id="preloader"><div class="loader"></div></div>
<div id="app">
    <div class="top-bar">
        <div class="logo">KUPIGIFTS</div>
        <div class="points">🎯 <span id="pointsVal">0</span></div>
        <div class="currencies">
            <div class="currency ton">◈ <span id="tonVal">0</span></div>
            <div class="currency rub">₽ <span id="rubVal">0</span></div>
            <div class="currency stars">★ <span id="starsVal">0</span></div>
        </div>
    </div>
    <div class="content">
        <!-- MARKET TAB -->
        <div class="tab-pane active" id="tab-market">
            <div class="filter-section">
                <div class="filter-row" id="collectionFilters"></div>
                <div class="price-range">
                    <input type="number" id="priceMin" placeholder="Min" value="">
                    <span>—</span>
                    <input type="number" id="priceMax" placeholder="Max" value="">
                    <button id="applyPriceFilter">Apply</button>
                    <button id="resetPriceFilter">Reset</button>
                </div>
            </div>
            <div class="sort-bar">
                <div><button class="sort-btn" id="sortAsc">↑ Price</button><button class="sort-btn" id="sortDesc">↓ Price</button></div>
            </div>
            <div class="gifts-grid" id="marketGrid"></div>
        </div>
        <!-- MY GIFTS TAB -->
        <div class="tab-pane" id="tab-mygifts">
            <div class="mygifts-tabs">
                <div class="mygifts-tab active" data-tab="gifts">🎁 Гифты</div>
                <div class="mygifts-tab" data-tab="offers">📊 Оферы</div>
                <div class="mygifts-tab" data-tab="history">📜 История</div>
            </div>
            <div class="mygifts-actions">
                <div class="mygifts-action-btn">➕ Добавить</div>
                <div class="mygifts-action-btn">📤 Вывести</div>
                <div class="mygifts-action-btn">📨 Отправить</div>
                <div class="mygifts-action-btn">🏷️ Продать</div>
            </div>
            <div class="filter-stubs">
                <div class="stub">Коллекция</div>
                <div class="stub">Модель</div>
                <div class="stub">Фон</div>
                <div class="stub">Символ</div>
            </div>
            <div id="myGiftsContent"></div>
        </div>
        <!-- PROFILE TAB -->
        <div class="tab-pane" id="tab-profile">
            <div style="background:rgba(28,28,36,0.5); border-radius:32px; padding:28px; text-align:center;">
                <div class="avatar" id="avatarTrigger">👤</div>
                <div style="font-size:18px; font-weight:700;">crypto_panda</div>
                <div style="color:#FFD966; margin:6px;">⭐ 4.92 ★</div>
                <div style="font-size:26px; font-weight:800; color:#00FF88;" id="profileRub">0 ₽</div>
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <div style="flex:1; background:rgba(0,0,0,0.4); border-radius:20px; padding:12px;"><div style="font-size:22px; font-weight:800;" id="purchasedCount">0</div><div>Purchased</div></div>
                    <div style="flex:1; background:rgba(0,0,0,0.4); border-radius:20px; padding:12px;"><div style="font-size:22px; font-weight:800;" id="soldCount">0</div><div>Sold</div></div>
                </div>
                <div class="manager-link">📞 Для добавления подарков напишите <a href="https://t.me/ManagerKupiKod" target="_blank">@ManagerKupiKod</a></div>
            </div>
        </div>
    </div>
    <div class="bottom-nav">
        <button class="nav-btn active" data-tab="market"><span class="nav-icon">🛒</span><span>Маркет</span></button>
        <button class="nav-btn" data-tab="mygifts"><span class="nav-icon">🎁</span><span>Мои подарки</span></button>
        <button class="nav-btn" data-tab="profile"><span class="nav-icon">👤</span><span>Профиль</span></button>
    </div>
</div>

<div class="modal-overlay" id="giftModal"><div class="modal-content" id="modalContent"></div></div>

<div class="admin-modal" id="adminModal">
    <div class="admin-panel">
        <div style="font-size:20px; font-weight:800; margin-bottom:12px;">🛠 Admin Panel</div>
        <input type="text" id="giftLink" class="admin-input" placeholder="Telegram gift link (t.me/gift/... or /nft/...)">
        <button class="admin-btn" id="fetchGiftBtn" style="background:#2C2C3A; color:#00FF88;">🔍 Fetch from link</button>
        <div id="fetchPreview" style="margin-top:10px; display:none;">
            <img id="fetchedImage" class="preview-img">
            <div style="font-size:12px; margin:4px 0;"><span id="fetchedName"></span> <span id="fetchedNumber" style="color:#aaa;"></span></div>
        </div>
        <div class="admin-row"><input type="text" id="adminName" class="admin-input" placeholder="Gift name"><input type="text" id="adminNumber" class="admin-input" placeholder="Number (e.g. #130296)"></div>
        <input type="text" id="adminImage" class="admin-input" placeholder="Image URL">
        <div class="admin-row"><input type="number" id="adminPrice" class="admin-input" placeholder="Price" style="flex:1"><select id="adminCurrency" class="admin-select"><option>RUB</option><option>TON</option><option>Stars</option></select></div>
        <select id="adminBg" class="admin-input"></select>
        <select id="adminSymbol" class="admin-input"></select>
        <select id="adminModel" class="admin-input"><option>Classic</option><option>Rare</option><option>Epic</option><option>Legendary</option><option>Mythic</option></select>
        <button class="admin-btn" id="addGiftBtn">➕ Add to Market</button>
        <button class="admin-btn" style="background:#2C2C3A; color:white; margin-top:6px;" onclick="closeAdmin()">Close</button>
        <div id="imagePreview" style="margin-top:10px; text-align:center;"></div>
    </div>
</div>
<div class="toast" id="toastMsg"></div>

<script>
    // ---------- ФИКСИРОВАННЫЕ КОЛЛЕКЦИИ ----------
    const COLLECTIONS_LIST = ["Santa Hat", "Christmas Tree", "Snowman", "Easter Egg", "Pumpkin", "Fireworks", "Heart Balloon", "Party Popper", "Homemade Cake", "Ice Cream", "Kitty", "Magic Wand", "Rainbow", "Pixel Heart", "Dragon Egg", "Unicorn Horn", "Pepe", "Doge", "Shiba", "Snoop Cigar", "Mousse Cake", "Vice Cream"];
    const ALL_BGS = ["Dark Abyss","Neon City","Crystal Cave","Lava Core","Frostbite","Cyberpunk","Dreamscape","Void","Grape","Turquoise","Indigo Dye","Electric Indigo","Mint Green","Hunter Green","Ivory White","Emerald","Jade Green","Satin Gold","Cappuccino","Midnight Blue","Shamrock Green","Malachite","Pine Green","Copper","Black","Roman Silver","Sky Blue","Mystic Pearl","Neon Blue","Battleship Grey","Coral Red","Caramel","English Violet","Rosewood","Lemongrass","Onyx Black","Orange","Dark Lilac","Cyberpunk","Pacific Cyan","Electric Purple","Desert Sand","Persimmon","Chocolate","Pistachio","Pure Gold","Platinum","Strawberry","Cobalt Blue","French Blue","Pacific Green","Amber","Light Olive","Carrot Juice","Silver Blue","Chestnut","Aquamarine","Khaki Green","Burgundy","Sapphire","Steel Grey","Navy Blue","Lavender","Purple","Azure Blue","Moonstone","Fandango","Raspberry","Gunmetal","Carmine","Marine Blue","Tomato","Old Gold","Mustard","French Violet","Rifle Green","Ranger Green","Feldgrau","Deep Cyan","Burnt Sienna","Celtic Blue","Mexican Pink","Gunship Green","Fire Engine","Dark Green","Tactical Pine","Seal Brown","Camo Green"];
    const ALL_SYMBOLS = ["Star","Moon","Diamond","Flame","Thunder","Skull","Heart","Crown","Lightning","Snowflake","Rose","Sword","Shield","Anchor","Key","Lock","Eye","Dragon","Phoenix","Wolf","Eagle","Lion","Tiger","Bear","Snake","Spider","Butterfly","Bee","Ant","Spiral","Triangle","Square","Circle","Cross","Infinity","Omega","Sigma","Delta"];
    const MODEL_LIST = ["Classic","Rare","Epic","Legendary","Mythic"];

    // ---------- ОБЛАЧНАЯ СИНХРОНИЗАЦИЯ JSONBin ----------
    const JSONBIN_BIN_ID = '6a0e195f6877513b27a5fd8b';
    const JSONBIN_API_KEY = '$2a$10$Hh2yGWgUT/xVi/KVa7ANfetJuDVlAh2yOog0FHSIYDOst/g8HZchO';

    let marketGifts = [];
    let myGifts = [];
    let balances = { ton: 0, rub: 0, stars: 0, points: 0 };
    let currentFilterCol = "all";
    let priceMin = 0, priceMax = Infinity;
    let currentSort = "asc";
    let selectedGift = null;
    let myGiftsTab = "gifts";

    // Сохранение в облако
    async function saveToCloud() {
        try {
            const data = { marketGifts, myGifts, balances };
            await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': JSONBIN_API_KEY
                },
                body: JSON.stringify(data)
            });
            console.log('Saved to cloud');
        } catch(e) { console.error('Save error', e); }
    }

    // Загрузка из облака (с созданием бина, если нет данных)
    async function loadFromCloud() {
        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': JSONBIN_API_KEY }
            });
            if (!response.ok) throw new Error('Load failed');
            const data = await response.json();
            marketGifts = data.record.marketGifts || [];
            myGifts = data.record.myGifts || [];
            balances = data.record.balances || { ton: 0, rub: 0, stars: 0, points: 0 };
            // Если в облаке пусто, инициализируем пустыми массивами
            if (marketGifts.length === 0) marketGifts = [];
            if (myGifts.length === 0) myGifts = [];
            updateUI();
            renderFilters();
            renderMarket();
            renderMyGiftsContent();
            toast('Данные загружены из облака');
        } catch(e) {
            console.error(e);
            // Если бина нет или ошибка, создаём пустую структуру
            toast('Не удалось загрузить из облака, создаём новое хранилище');
            marketGifts = [];
            myGifts = [];
            balances = { ton: 0, rub: 0, stars: 0, points: 0 };
            await saveToCloud();
            updateUI();
            renderFilters();
            renderMarket();
            renderMyGiftsContent();
        }
    }

    // Локальное сохранение (дублируем в облако)
    function saveData() {
        localStorage.setItem("kupigifts_market", JSON.stringify(marketGifts));
        localStorage.setItem("kupigifts_my", JSON.stringify(myGifts));
        localStorage.setItem("kupigifts_bal", JSON.stringify(balances));
        saveToCloud(); // синхронизируем с облаком
    }

    function updateUI() {
        document.getElementById("pointsVal").innerText = balances.points;
        document.getElementById("tonVal").innerText = balances.ton;
        document.getElementById("rubVal").innerText = balances.rub;
        document.getElementById("starsVal").innerText = balances.stars;
        document.getElementById("profileRub").innerHTML = balances.rub + " ₽";
        document.getElementById("purchasedCount").innerText = myGifts.length;
        document.getElementById("soldCount").innerText = "0";
    }

    function getCollections() {
        return COLLECTIONS_LIST;
    }

    function renderFilters() {
        const container = document.getElementById("collectionFilters");
        if (!container) return;
        const collections = getCollections();
        container.innerHTML = `<div class="filter-pill ${currentFilterCol === 'all' ? 'active' : ''}" data-filter="all">📚 All</div>` +
            collections.map(c => `<div class="filter-pill ${currentFilterCol === c ? 'active' : ''}" data-filter="${c}">${c}</div>`).join('');
        document.querySelectorAll("#collectionFilters .filter-pill").forEach(btn => {
            btn.addEventListener("click", () => {
                currentFilterCol = btn.getAttribute("data-filter");
                renderFilters();
                renderMarket();
            });
        });
    }

    function renderMarket() {
        let filtered = marketGifts.filter(g => {
            if (currentFilterCol !== "all" && g.name !== currentFilterCol) return false;
            let p = g.price;
            if (p < priceMin || p > priceMax) return false;
            return true;
        });
        if (currentSort === "asc") filtered.sort((a,b) => a.price - b.price);
        else filtered.sort((a,b) => b.price - a.price);
        const grid = document.getElementById("marketGrid");
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:gray;">Нет подарков. Добавьте через админ-панель.</div>';
            return;
        }
        grid.innerHTML = filtered.map(g => `
            <div class="gift-card" onclick='openGiftModal(${JSON.stringify(g).replace(/'/g, "&#39;")})'>
                <img class="gift-img" src="${g.img}" onerror="this.src='https://placehold.co/400x400/1a1a2e/00FF88?text=?'">
                <div class="gift-name">${escapeHtml(g.name)}</div>
                <div class="gift-number">${g.number}</div>
                <div class="gift-price">${g.price} ${g.currency}</div>
                <div class="gift-badge">${g.model}</div>
            </div>
        `).join('');
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function openGiftModal(gift) {
        selectedGift = gift;
        const modal = document.getElementById("modalContent");
        modal.innerHTML = `
            <img src="${gift.img}" style="width:100%; border-radius:20px; margin-bottom:12px;" onerror="this.src='https://placehold.co/400x400/1a1a2e/00FF88?text=?'">
            <div style="font-size:20px; font-weight:800;">${escapeHtml(gift.name)}</div>
            <div style="color:#aaa; font-family:monospace;">${gift.number}</div>
            <div class="modal-stats">
                <div class="modal-stat"><div>Model</div><div>${gift.model}</div></div>
                <div class="modal-stat"><div>Background</div><div>${gift.bg}</div></div>
                <div class="modal-stat"><div>Symbol</div><div>${gift.symbol}</div></div>
            </div>
            <div style="font-size:32px; color:#00FF88; text-align:center; margin:12px 0;">${gift.price} ${gift.currency}</div>
            <button class="buy-btn" id="modalBuyBtn">Купить</button>
        `;
        document.getElementById("giftModal").classList.add("open");
        document.getElementById("modalBuyBtn").onclick = () => buyGift();
    }
    function closeGiftModal() { document.getElementById("giftModal").classList.remove("open"); }
    function buyGift() {
        if (!selectedGift) return;
        let cost = selectedGift.price;
        let currency = selectedGift.currency;
        let enough = false;
        if (currency === "RUB" && balances.rub >= cost) { balances.rub -= cost; enough = true; }
        else if (currency === "TON" && balances.ton >= cost) { balances.ton -= cost; enough = true; }
        else if (currency === "Stars" && balances.stars >= cost) { balances.stars -= cost; enough = true; }
        if (!enough) { toast("Недостаточно средств"); return; }
        balances.points += Math.floor(cost * 0.5);
        myGifts.push({ ...selectedGift, id: Date.now() });
        saveData();
        updateUI();
        renderMyGiftsContent();
        closeGiftModal();
        toast(`Куплен ${selectedGift.name}`);
    }
    function renderMyGiftsContent() {
        const container = document.getElementById("myGiftsContent");
        if (!container) return;
        if (myGiftsTab === "gifts") {
            if (myGifts.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:gray;">Нет подарков</div>';
                return;
            }
            container.innerHTML = `<div class="gifts-grid">` + myGifts.map(g => `
                <div class="gift-card">
                    <img class="gift-img" src="${g.img}" onerror="this.src='https://placehold.co/400x400/1a1a2e/00FF88?text=?'">
                    <div class="gift-name">${escapeHtml(g.name)}</div>
                    <div class="gift-number">${g.number}</div>
                    <div class="gift-price">${g.price} ${g.currency}</div>
                    <div class="gift-badge">Collected</div>
                </div>
            `).join('') + `</div>`;
        } else if (myGiftsTab === "offers") {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:gray;">Нет активных оферов</div>';
        } else {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:gray;">История покупок будет здесь</div>';
        }
    }

    // ---------- АДМИН-ПАНЕЛЬ (без изменений, но с облачной синхронизацией) ----------
    const API_BASE = 'http://127.0.0.1:5001';
    let fetchedData = null;
    document.getElementById("fetchGiftBtn").onclick = async () => {
        const link = document.getElementById("giftLink").value.trim();
        if (!link) { toast("Введите ссылку"); return; }
        toast("Загрузка...");
        try {
            const resp = await fetch(`${API_BASE}/api/search_gift`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ link: link })
            });
            const data = await resp.json();
            if (data.error) { toast(data.error); return; }
            fetchedData = data;
            document.getElementById("fetchedImage").src = data.photo_url || "";
            document.getElementById("fetchedName").innerText = data.name || "";
            document.getElementById("fetchedNumber").innerText = data.number || "";
            document.getElementById("fetchPreview").style.display = "block";
            if (data.name) document.getElementById("adminName").value = data.name;
            if (data.number) document.getElementById("adminNumber").value = data.number;
            if (data.photo_url) document.getElementById("adminImage").value = data.photo_url;
            toast("Данные загружены. Заполните цену и остальное.");
        } catch(e) {
            toast("Ошибка: " + e.message + " (сервер не запущен?)");
        }
    };
    document.getElementById("addGiftBtn").onclick = () => {
        const name = document.getElementById("adminName").value.trim();
        const number = document.getElementById("adminNumber").value.trim();
        let img = document.getElementById("adminImage").value.trim();
        const price = parseFloat(document.getElementById("adminPrice").value);
        const currency = document.getElementById("adminCurrency").value;
        const bg = document.getElementById("adminBg").value;
        const symbol = document.getElementById("adminSymbol").value;
        const model = document.getElementById("adminModel").value;
        if (!name || !number || !img || isNaN(price) || price <= 0) {
            toast("Заполните все поля (название, номер, URL картинки, цену)");
            return;
        }
        if (!img) img = "https://placehold.co/400x400/1a1a2e/00FF88?text=?";
        const newGift = {
            id: Date.now(),
            name, number, img, price, currency, bg, symbol, model
        };
        marketGifts.push(newGift);
        saveData(); // сохраняет и в облако, и в localStorage
        renderFilters();
        renderMarket();
        toast(`✅ ${name} добавлен в маркет (виден всем)`);
        // очистка формы
        document.getElementById("giftLink").value = "";
        document.getElementById("fetchPreview").style.display = "none";
        document.getElementById("adminName").value = "";
        document.getElementById("adminNumber").value = "";
        document.getElementById("adminImage").value = "";
        document.getElementById("adminPrice").value = "";
        fetchedData = null;
    };
    function fillSelects() {
        const bgSelect = document.getElementById("adminBg");
        bgSelect.innerHTML = ALL_BGS.map(b => `<option>${b}</option>`).join('');
        const symSelect = document.getElementById("adminSymbol");
        symSelect.innerHTML = ALL_SYMBOLS.map(s => `<option>${s}</option>`).join('');
    }
    document.getElementById("adminImage").addEventListener("input", (e) => {
        const url = e.target.value;
        if (url) document.getElementById("imagePreview").innerHTML = `<img src="${url}" class="preview-img" onerror="this.style.display='none'">`;
        else document.getElementById("imagePreview").innerHTML = "";
    });

    // Price range
    document.getElementById("applyPriceFilter").onclick = () => {
        let min = parseFloat(document.getElementById("priceMin").value);
        let max = parseFloat(document.getElementById("priceMax").value);
        priceMin = isNaN(min) ? 0 : min;
        priceMax = isNaN(max) ? Infinity : max;
        renderMarket();
    };
    document.getElementById("resetPriceFilter").onclick = () => {
        document.getElementById("priceMin").value = "";
        document.getElementById("priceMax").value = "";
        priceMin = 0;
        priceMax = Infinity;
        renderMarket();
    };

    // Админ-панель: 10 нажатий на аватар, код 7706006550
    let tapCount = 0, tapTimer;
    document.getElementById("avatarTrigger").onclick = () => {
        tapCount++;
        clearTimeout(tapTimer);
        tapTimer = setTimeout(() => tapCount = 0, 2000);
        if (tapCount >= 10) {
            tapCount = 0;
            let code = prompt("Enter admin code:");
            if (code === "7706006550") {
                fillSelects();
                document.getElementById("adminModal").classList.add("open");
            } else toast("Invalid code");
        }
    };
    function closeAdmin() { document.getElementById("adminModal").classList.remove("open"); }

    // Переключение вкладок
    document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            const tab = btn.getAttribute("data-tab");
            document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
            document.getElementById(`tab-${tab}`).classList.add("active");
            document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            if (tab === "mygifts") renderMyGiftsContent();
        });
    });
    document.querySelectorAll(".mygifts-tab").forEach(tab => {
        tab.addEventListener("click", () => {
            const t = tab.getAttribute("data-tab");
            myGiftsTab = t;
            document.querySelectorAll(".mygifts-tab").forEach(tt => tt.classList.remove("active"));
            tab.classList.add("active");
            renderMyGiftsContent();
        });
    });
    document.getElementById("sortAsc").onclick = () => { currentSort = "asc"; renderMarket(); };
    document.getElementById("sortDesc").onclick = () => { currentSort = "desc"; renderMarket(); };
    document.getElementById("giftModal").addEventListener("click", (e) => { if (e.target === document.getElementById("giftModal")) closeGiftModal(); });
    document.getElementById("adminModal").addEventListener("click", (e) => { if (e.target === document.getElementById("adminModal")) closeAdmin(); });

    function toast(msg) {
        const t = document.getElementById("toastMsg");
        t.innerText = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2000);
    }

    // Старт: загружаем из облака, затем рендерим
    (async () => {
        await loadFromCloud();
        renderFilters();
        renderMarket();
        renderMyGiftsContent();
        updateUI();
        setTimeout(() => {
            document.getElementById("preloader").classList.add("hide");
            document.getElementById("app").classList.add("show");
        }, 800);
    })();
</script>
</body>
</html>
