<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xRocket</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- ШАПКА КАК НА КАРТИНКЕ -->
        <div class="header">
            <div class="balance-row">
                <span class="balance-number">0</span>
                <span class="balance-currency">TON</span>
            </div>
            <div class="header-stats">
                <span>3 collections</span>
                <span class="commission">Commission 0%</span>
            </div>
        </div>

        <!-- ВКЛАДКИ -->
        <div class="tabs">
            <button class="tab active">All items</button>
            <button class="tab">Collections</button>
            <button class="tab">Bundles</button>
        </div>

        <!-- QUICK FIND -->
        <div class="quick-find">
            <i class="fas fa-search"></i>
            <span>Quick find</span>
        </div>

        <!-- ОСНОВНЫЕ КНОПКИ (6 штук) -->
        <div class="menu-grid">
            <div class="menu-item" data-action="collection">
                <i class="fas fa-layer-group"></i>
                <span>Collection</span>
            </div>
            <div class="menu-item" data-action="model">
                <i class="fas fa-cube"></i>
                <span>Model</span>
            </div>
            <div class="menu-item" data-action="back">
                <i class="fas fa-arrow-left"></i>
                <span>Back</span>
            </div>
            <div class="menu-item" data-action="store">
                <i class="fas fa-store"></i>
                <span>Store</span>
            </div>
            <div class="menu-item" data-action="gifts" id="myGiftsBtn">
                <i class="fas fa-gift"></i>
                <span>My gifts</span>
            </div>
            <div class="menu-item" data-action="season">
                <i class="fas fa-calendar"></i>
                <span>Season</span>
            </div>
        </div>

        <!-- НИЖНЯЯ НАВИГАЦИЯ (3 кнопки) -->
        <div class="bottom-nav">
            <div class="nav-item active" data-page="store">
                <i class="fas fa-store"></i>
                <span>Store</span>
            </div>
            <div class="nav-item" data-page="gifts" id="giftNavBtn">
                <i class="fas fa-gift"></i>
                <span>My gift</span>
            </div>
            <div class="nav-item" data-page="profile" id="profileNavBtn">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </div>
        </div>

        <!-- СТРАНИЦА STORE (С NFT) -->
        <div id="storePage" class="page active">
            <div class="nft-grid" id="nftGrid"></div>
        </div>

        <!-- СТРАНИЦА MY GIFTS -->
        <div id="giftsPage" class="page" style="display: none;">
            <div class="page-header">
                <button class="back-btn" id="backFromGifts">←</button>
                <h2>My gifts</h2>
            </div>
            
            <div class="gifts-content">
                <div class="gifts-zero">0</div>
                <div class="gifts-buttons">
                    <button class="gift-action-btn" id="addBtn">Пополнить</button>
                    <button class="gift-action-btn" id="withdrawBtn">Вывести</button>
                </div>
            </div>
        </div>

        <!-- СТРАНИЦА PROFILE -->
        <div id="profilePage" class="page" style="display: none;">
            <div class="page-header">
                <button class="back-btn" id="backFromProfile">←</button>
                <h2>Profile</h2>
            </div>
            
            <div class="profile-content">
                <div class="profile-info">
                    <p>👤 Имя: <span id="profileName">Загрузка...</span></p>
                    <p>🆔 ID: <span id="profileId">-</span></p>
                    <p>🖼️ NFT: 0</p>
                    <p>💰 Баланс: 0 TON</p>
                </div>
            </div>
        </div>

        <!-- МОДАЛКА ПОПОЛНЕНИЯ -->
        <div id="replenishModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>Пополнение</h3>
                <p>Напишите менеджеру:</p>
                <div class="manager-link" id="managerLink">@ManagerKupiKod</div>
                <button class="close-btn" id="closeReplenish">Закрыть</button>
            </div>
        </div>

        <!-- МОДАЛКА ВЫВОДА -->
        <div id="withdrawModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>Вывод средств</h3>
                <input type="text" id="tonWallet" placeholder="TON кошелек">
                <input type="text" id="cardNumber" placeholder="Номер карты">
                <button class="submit-btn" id="submitWithdraw">Отправить</button>
                <button class="close-btn" id="closeWithdraw">Отмена</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
