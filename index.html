<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xRocket</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Шапка точно как на картинке -->
        <div class="header">
            <div class="balance-row">
                <span class="balance-number">0</span>
                <span class="balance-currency">OTON</span>
            </div>
            <div class="header-stats">
                <span>3 collections</span>
                <span class="commission">Commission 0%</span>
            </div>
        </div>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab active">All items</button>
            <button class="tab">Collections</button>
            <button class="tab">Bundles</button>
        </div>

        <!-- Quick find -->
        <div class="quick-find">
            <i class="fas fa-search"></i>
            <span>Quick find</span>
        </div>

        <!-- Кнопки как на картинке -->
        <div class="menu-grid">
            <!-- Collection -->
            <div class="menu-item" data-action="collection">
                <i class="fas fa-layer-group"></i>
                <span>Collection</span>
            </div>

            <!-- Model -->
            <div class="menu-item" data-action="model">
                <i class="fas fa-cube"></i>
                <span>Model</span>
            </div>

            <!-- Back -->
            <div class="menu-item" data-action="back">
                <i class="fas fa-arrow-left"></i>
                <span>Back</span>
            </div>

            <!-- Store -->
            <div class="menu-item" data-action="store">
                <i class="fas fa-store"></i>
                <span>Store</span>
            </div>

            <!-- My gifts (именно так как на картинке) -->
            <div class="menu-item" id="myGiftsBtn" data-action="gifts">
                <i class="fas fa-gift"></i>
                <span>My gifts</span>
            </div>

            <!-- Season -->
            <div class="menu-item" data-action="season">
                <i class="fas fa-calendar"></i>
                <span>Season</span>
            </div>
        </div>

        <!-- Страница My Gifts (скрыта) -->
        <div id="giftsPage" style="display: none;">
            <div class="page-header">
                <button class="back-btn" id="backFromGifts">←</button>
                <h2>My gifts</h2>
            </div>
            <div class="gifts-content">
                <div class="gifts-zero">0</div>
                <div class="gifts-buttons">
                    <button class="replenish-btn" id="replenishBtn">Пополнить</button>
                    <button class="withdraw-btn" id="withdrawBtn">Вывести</button>
                </div>
            </div>
        </div>

        <!-- Модалка менеджера -->
        <div id="managerModal" style="display: none;">
            <div class="modal-overlay">
                <div class="modal-box">
                    <h3>Пополнение</h3>
                    <p>Напишите менеджеру:</p>
                    <div class="manager-link" id="managerLink">@ManagerKupiKod</div>
                    <button class="close-modal" id="closeModal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
